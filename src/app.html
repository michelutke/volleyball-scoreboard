<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			(function () {
				function readCookie(name) {
					var m = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
					return m ? decodeURIComponent(m[1]) : null;
				}
				var t = readCookie('scoring-theme') || localStorage.getItem('theme');
				var resolved;
				if (t === 'light' || t === 'dark') resolved = t;
				else resolved = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
				document.documentElement.dataset.theme = resolved;

				var m = readCookie('scoring-motion');
				if (m === 'full' || m === 'damped' || m === 'static') {
					document.documentElement.dataset.motion = m;
				} else {
					document.documentElement.removeAttribute('data-motion');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
